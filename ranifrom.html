<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RANI</title>

<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #4CAF50, #2e7d32);
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  color: white;
}

/* HEADER */
.header { text-align: center; }

/* LOGO */
.logo {
  font-family: 'Black Ops One', cursive;
  font-size: 70px;
  margin: 0;
}

/* SLOGAN */
.slogan {
  font-size: 14px;
  margin-top: 2px;
}

/* CARD */
.card {
  margin-top: 25px;
  width: 90%;
  max-width: 380px;
  background: #f5f5f5;
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  color: black;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

textarea {
  height: 80px;
  resize: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  background: #ff5722;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
}

/* STATUS */
#status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">RANI</div>
  <div class="slogan">Tận Tâm - Phục Vụ</div>
</div>

<div class="card">

  <input id="name" placeholder="Tên cửa hàng">
  <input id="phone" placeholder="Số điện thoại">
  <textarea id="note" placeholder="Ghi chú"></textarea>

  <p style="font-size:13px;text-align:center;">
    📍 Cần vị trí để xác định nơi giao hàng
  </p>

  <button onclick="handleSubmit()">Hối Hàng</button>

  <div id="status"></div>

</div>

<script>
function handleSubmit(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let note = document.getElementById("note").value;
  let status = document.getElementById("status");

  if(phone.trim() === ""){
    status.innerHTML = "⚠️ Vui lòng nhập số điện thoại";
    status.style.color = "red";
    return;
  }

  status.innerHTML = "🔄 Đang lấy vị trí...";
  status.style.color = "black";

  navigator.geolocation.getCurrentPosition(
    function(pos){
      let lat = pos.coords.latitude;
      let lng = pos.coords.longitude;

      let url = "https://script.google.com/macros/s/AKfycbyXeKyQvjEYrTsLPExjbXI9ulrcFqlgkB4wdKdIStspa3IVHBUmVn8_sXpaYeKCkziS/exec"
        + "?name=" + encodeURIComponent(name)
        + "&phone=" + encodeURIComponent(phone)
        + "&note=" + encodeURIComponent(note)
        + "&lat=" + lat
        + "&lng=" + lng;

      fetch(url)
        .then(res => res.text())
        .then(data => {
          status.innerHTML = "✅ Gửi thành công!";
          status.style.color = "green";
        });
    },

    function(){
      status.innerHTML = `
        ⚠️ Bạn chưa bật vị trí <br><br>
        <button onclick="handleSubmit()">Thử lại</button>
      `;
      status.style.color = "red";
    }
  );
}
</script>

</body>
</html>
